<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniTrack</title>
    <link rel="icon" href="images/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Sora:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/navBar.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg uni-navbar sticky-top">
        <div class="container">
            <a class="navbar-website website-mark" href="#">
                <img src="images/logo.png" alt="UniTrack logo" class="website-logo">
            </a>

            <button class="navbar-toggler custom-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#uniNavbar" aria-controls="uniNavbar" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="uniNavbar">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 nav-links-wrap">
                    <li class="nav-item"><a class="nav-link active" aria-current="page" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">About</a></li>
                </ul>
                <div class="d-flex align-items-center gap-2 nav-actions">
                    <a href="#" class="btn btn-warning btn-sm start-btn">Open Dashboard</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <h1 class="page-title">Phase 2 - Navbar Design</h1>
        <p class="page-subtitle">Navigation is ready. Next we can build the hero section and the rest of the landing page from your wireframe.</p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
